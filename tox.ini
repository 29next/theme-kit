[tox]
envlist = py310, py311, py312, py313, py314
skip_missing_interpreters = true

[gh-actions]
python =
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313
    3.14: py314

[testenv]
allowlist_externals = /usr/bin/test
deps =
    pytest
    pytest-cov
    flake8
    codecov

commands = pytest --cov=ntk --cov-report xml
